
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary);}
.preview-area{background:#d8d8d8;border-radius:12px;padding:32px 24px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;}
.pnav{display:inline-flex;align-items:center;gap:2px;padding:5px 6px;}
#pnav-brand-prev{text-decoration:none;white-space:nowrap;}
.pnav-link-prev{text-decoration:none;white-space:nowrap;cursor:pointer;}
.pnav-link-prev.active{background:#fff;}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem;}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:14px 16px;}
.card h3{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;}
.full{grid-column:1/-1;}
.row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.row:last-child{margin-bottom:0;}
.row label{font-size:12px;color:var(--color-text-secondary);width:110px;flex-shrink:0;}
.row input[type=range]{flex:1;}
.row input[type=text],.row input[type=color]{flex:1;}
.hex-row{display:flex;align-items:center;gap:6px;flex:1;}
.hex-row input[type=color]{width:32px;height:28px;padding:1px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;cursor:pointer;background:none;}
.hex-row input[type=text]{flex:1;font-size:12px;font-family:var(--font-mono);height:28px;padding:0 8px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-primary);}
.page-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.page-row input[type=text]{flex:1;font-size:12px;height:28px;padding:0 8px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-primary);}
.page-row button{width:26px;height:28px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.page-row button:hover{background:var(--color-background-tertiary);}
.add-btn{font-size:12px;color:var(--color-text-secondary);background:none;border:0.5px dashed var(--color-border-secondary);border-radius:6px;padding:5px 10px;cursor:pointer;width:100%;margin-top:4px;}
.add-btn:hover{background:var(--color-background-secondary);}
.val-label{font-size:11px;color:var(--color-text-tertiary);width:28px;text-align:right;flex-shrink:0;}
.actions{display:flex;gap:8px;margin-bottom:1rem;}
.btn-export{flex:1;padding:10px;border-radius:8px;border:none;background:#111;color:#fff;font-size:13px;font-family:var(--font-sans);cursor:pointer;font-weight:500;}
.btn-export:hover{background:#333;}
.btn-reset{padding:10px 16px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans);cursor:pointer;}
.btn-reset:hover{background:var(--color-background-tertiary);}
.code-out{display:none;background:#1a1a1a;border-radius:10px;padding:14px;font-size:11px;font-family:var(--font-mono);color:#d4d4d4;white-space:pre;overflow-x:auto;line-height:1.6;position:relative;}
.copy-btn{position:absolute;top:10px;right:10px;background:#333;color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;}
.copy-btn:hover{background:#555;}
input[type=range]{accent-color:#111;}
</style>

<h2 class="sr-only">Squarespace pill navigation bar customizer</h2>

<div class="preview-area">
  <div class="pnav" id="prevNav">
    <a id="pnav-brand-prev" href="#">Cubed</a>
    <a class="pnav-link-prev active" href="#">Plugins</a>
    <a class="pnav-link-prev" href="#">About</a>
    <a class="pnav-link-prev" href="#">Contact</a>
    <a class="pnav-link-prev" href="#">Cart</a>
  </div>
</div>

<div class="controls">
  <div class="card">
    <h3>Container pill</h3>
    <div class="row"><label>Background</label><div class="hex-row"><input type="color" id="c-navbg" value="#f0f0f0"><input type="text" id="c-navbg-hex" value="#f0f0f0" maxlength="7"></div></div>
    <div class="row"><label>Roundness</label><input type="range" id="c-navrad" min="0" max="40" value="40" step="1"><span class="val-label" id="c-navrad-v">40</span></div>
    <div class="row"><label>Padding (px)</label><input type="range" id="c-navpad" min="2" max="16" value="5" step="1"><span class="val-label" id="c-navpad-v">5</span></div>
  </div>

  <div class="card">
    <h3>Active pill</h3>
    <div class="row"><label>Background</label><div class="hex-row"><input type="color" id="c-pillbg" value="#ffffff"><input type="text" id="c-pillbg-hex" value="#ffffff" maxlength="7"></div></div>
    <div class="row"><label>Roundness</label><input type="range" id="c-pillrad" min="0" max="40" value="40" step="1"><span class="val-label" id="c-pillrad-v">40</span></div>
  </div>

  <div class="card">
    <h3>Logo / brand</h3>
    <div class="row"><label>Name</label><input type="text" id="c-brandname" value="Cubed" style="flex:1;font-size:12px;height:28px;padding:0 8px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-primary);"></div>
    <div class="row"><label>Link href</label><input type="text" id="c-brandhref" value="/" style="flex:1;font-size:12px;height:28px;padding:0 8px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-primary);"></div>
    <div class="row"><label>Image URL</label><input type="text" id="c-logourl" placeholder="https://i.imgur.com/..." style="flex:1;font-size:12px;height:28px;padding:0 8px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-primary);"></div>
    <div class="row"><label>Logo size (px)</label><input type="range" id="c-logosize" min="16" max="48" value="24" step="1"><span class="val-label" id="c-logosize-v">24</span></div>
    <div class="row"><label>Brand font size</label><input type="range" id="c-brandfs" min="11" max="24" value="16" step="1"><span class="val-label" id="c-brandfs-v">16</span></div>
    <div class="row"><label>Brand color</label><div class="hex-row"><input type="color" id="c-brandc" value="#111111"><input type="text" id="c-brandc-hex" value="#111111" maxlength="7"></div></div>
  </div>

  <div class="card">
    <h3>Link text</h3>
    <div class="row"><label>Font size (px)</label><input type="range" id="c-linkfs" min="10" max="18" value="11" step="1"><span class="val-label" id="c-linkfs-v">11</span></div>
    <div class="row"><label>Default color</label><div class="hex-row"><input type="color" id="c-linkc" value="#111111"><input type="text" id="c-linkc-hex" value="#111111" maxlength="7"></div></div>
    <div class="row"><label>Active color</label><div class="hex-row"><input type="color" id="c-activec" value="#111111"><input type="text" id="c-activec-hex" value="#111111" maxlength="7"></div></div>
  </div>

  <div class="card full">
    <h3>Pages</h3>
    <div id="pages-list"></div>
    <button class="add-btn" id="add-page-btn">+ add page</button>
  </div>
</div>

<div class="actions">
  <button class="btn-reset" id="reset-btn">Reset</button>
  <button class="btn-export" id="export-btn">Export code</button>
</div>

<div class="code-out" id="code-out">
  <button class="copy-btn" id="copy-btn">Copy</button>
  <span id="code-text"></span>
</div>

<script>
var defaults = {
  navbg:'#f0f0f0',navrad:40,navpad:5,
  pillbg:'#ffffff',pillrad:40,
  brandname:'Cubed',brandhref:'/',logourl:'',logosize:24,brandfs:16,brandc:'#111111',
  linkfs:11,linkc:'#111111',activec:'#111111',
  pages:[
    {label:'Plugins',href:'/'},
    {label:'About',href:'/about'},
    {label:'Contact',href:'/contact'},
    {label:'Cart',href:'/cart'}
  ]
};

var state = JSON.parse(JSON.stringify(defaults));

function $(id){return document.getElementById(id);}

function syncColorPair(colorId, hexId){
  $(colorId).addEventListener('input',function(){
    $(hexId).value=this.value;
    update();
  });
  $(hexId).addEventListener('input',function(){
    var v=this.value;
    if(/^#[0-9a-fA-F]{6}$/.test(v)){$(colorId).value=v;}
    update();
  });
}

function syncRange(rangeId, labelId, key){
  $(rangeId).addEventListener('input',function(){
    $(labelId).textContent=this.value;
    state[key]=parseInt(this.value);
    update();
  });
}

syncColorPair('c-navbg','c-navbg-hex');
syncColorPair('c-pillbg','c-pillbg-hex');
syncColorPair('c-brandc','c-brandc-hex');
syncColorPair('c-linkc','c-linkc-hex');
syncColorPair('c-activec','c-activec-hex');

syncRange('c-navrad','c-navrad-v','navrad');
syncRange('c-navpad','c-navpad-v','navpad');
syncRange('c-pillrad','c-pillrad-v','pillrad');
syncRange('c-brandfs','c-brandfs-v','brandfs');
syncRange('c-logosize','c-logosize-v','logosize');
syncRange('c-linkfs','c-linkfs-v','linkfs');

['c-navbg','c-navbg-hex','c-pillbg','c-pillbg-hex','c-brandc','c-brandc-hex','c-linkc','c-linkc-hex','c-activec','c-activec-hex'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(){
    var key=id.replace('c-','').replace('-hex','').replace(/-([a-z])/g,function(m,l){return l.toUpperCase();});
    var map={'navbg':'navbg','pillbg':'pillbg','brandc':'brandc','linkc':'linkc','activec':'activec'};
    var k=id.replace('c-','').replace('-hex','');
    if(map[k]) state[map[k]]=document.getElementById('c-'+k+'-hex').value;
    update();
  });
});

['c-brandname','c-brandhref','c-logourl'].forEach(function(id){
  $(id).addEventListener('input',function(){
    var k=id.replace('c-','');
    state[k]=this.value;
    update();
  });
});

function renderPages(){
  var list=$('pages-list');
  list.innerHTML='';
  state.pages.forEach(function(p,i){
    var row=document.createElement('div');
    row.className='page-row';
    row.innerHTML='<input type="text" placeholder="Label" value="'+p.label+'" data-i="'+i+'" data-field="label"><input type="text" placeholder="/href" value="'+p.href+'" data-i="'+i+'" data-field="href"><button data-del="'+i+'">x</button>';
    list.appendChild(row);
  });
  list.querySelectorAll('input').forEach(function(inp){
    inp.addEventListener('input',function(){
      state.pages[this.dataset.i][this.dataset.field]=this.value;
      update();
    });
  });
  list.querySelectorAll('[data-del]').forEach(function(btn){
    btn.addEventListener('click',function(){
      state.pages.splice(parseInt(this.dataset.del),1);
      renderPages();
      update();
    });
  });
}

$('add-page-btn').addEventListener('click',function(){
  state.pages.push({label:'New Page',href:'/new-page'});
  renderPages();
  update();
});

function update(){
  var nav=$('prevNav');
  var rad=state.navrad+'px';
  nav.style.background=document.getElementById('c-navbg-hex').value||state.navbg;
  nav.style.borderRadius=rad;
  nav.style.padding=state.navpad+'px '+(state.navpad+1)+'px';

  var brand=$('pnav-brand-prev');
  brand.textContent=state.logourl?'':state.brandname;
  brand.style.fontSize=state.brandfs+'px';
  brand.style.fontWeight='500';
  brand.style.color=document.getElementById('c-brandc-hex').value||state.brandc;
  brand.style.fontFamily="'DM Mono', monospace";
  brand.style.padding='7px 16px 7px 10px';

  if(state.logourl){
    if(!brand.querySelector('img')){brand.innerHTML='';}
    var img=brand.querySelector('img')||document.createElement('img');
    img.src=state.logourl;
    img.style.height=state.logosize+'px';
    img.style.width='auto';
    img.style.display='block';
    if(!brand.querySelector('img')) brand.appendChild(img);
  } else {
    brand.innerHTML='';
    brand.textContent=state.brandname;
  }

  var links=nav.querySelectorAll('.pnav-link-prev');
  links.forEach(function(l){nav.removeChild(l);});

  var pillrad=state.pillrad+'px';
  state.pages.forEach(function(p,i){
    var a=document.createElement('a');
    a.className='pnav-link-prev'+(i===0?' active':'');
    a.href='#';
    a.textContent=p.label;
    a.style.fontFamily="'DM Mono', monospace";
    a.style.fontSize=state.linkfs+'px';
    a.style.borderRadius=pillrad;
    a.style.padding='6px 14px';
    a.style.color=i===0?(document.getElementById('c-activec-hex').value||state.activec):(document.getElementById('c-linkc-hex').value||state.linkc);
    if(i===0){a.style.background=document.getElementById('c-pillbg-hex').value||state.pillbg;}
    nav.appendChild(a);
  });
}

$('reset-btn').addEventListener('click',function(){
  state=JSON.parse(JSON.stringify(defaults));
  $('c-navbg').value=state.navbg;$('c-navbg-hex').value=state.navbg;
  $('c-pillbg').value=state.pillbg;$('c-pillbg-hex').value=state.pillbg;
  $('c-brandc').value=state.brandc;$('c-brandc-hex').value=state.brandc;
  $('c-linkc').value=state.linkc;$('c-linkc-hex').value=state.linkc;
  $('c-activec').value=state.activec;$('c-activec-hex').value=state.activec;
  $('c-navrad').value=state.navrad;$('c-navrad-v').textContent=state.navrad;
  $('c-navpad').value=state.navpad;$('c-navpad-v').textContent=state.navpad;
  $('c-pillrad').value=state.pillrad;$('c-pillrad-v').textContent=state.pillrad;
  $('c-brandfs').value=state.brandfs;$('c-brandfs-v').textContent=state.brandfs;
  $('c-logosize').value=state.logosize;$('c-logosize-v').textContent=state.logosize;
  $('c-linkfs').value=state.linkfs;$('c-linkfs-v').textContent=state.linkfs;
  $('c-brandname').value=state.brandname;
  $('c-brandhref').value=state.brandhref;
  $('c-logourl').value='';
  $('code-out').style.display='none';
  renderPages();
  update();
});

$('export-btn').addEventListener('click',function(){
  var navbg=document.getElementById('c-navbg-hex').value||state.navbg;
  var pillbg=document.getElementById('c-pillbg-hex').value||state.pillbg;
  var brandc=document.getElementById('c-brandc-hex').value||state.brandc;
  var linkc=document.getElementById('c-linkc-hex').value||state.linkc;
  var activec=document.getElementById('c-activec-hex').value||state.activec;
  var navrad=state.navrad+'px';
  var pillrad=state.pillrad+'px';
  var navpad=state.navpad+'px '+(state.navpad+1)+'px';
  var brandfs=state.brandfs+'px';
  var linkfs=state.linkfs+'px';
  var logourl=state.logourl;
  var brandname=state.brandname;
  var brandhref=state.brandhref;
  var logosize=state.logosize+'px';

  var brandHtml=logourl
    ? '<a id="pnav-brand" href="'+brandhref+'"><img src="'+logourl+'" style="height:'+logosize+';width:auto;display:block;" alt="'+brandname+'"></a>'
    : '<a id="pnav-brand" href="'+brandhref+'">'+brandname+'</a>';

  var linksHtml=state.pages.map(function(p){
    return '    <a class="pnav-link" href="'+p.href+'">'+p.label+'</a>';
  }).join('\n');

  var code='<style>\n@import url(\'https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap\');\n\nheader.header,\n.header-nav,\n.header-actions,\n.header-branding,\n.header-title-nav,\n.site-navigation { display: none !important; }\n\nbody { padding-top: 72px !important; }\n\n#pill-nav-wrapper {\n  position: fixed;\n  top: 16px;\n  left: 0;\n  right: 0;\n  display: flex;\n  justify-content: center;\n  z-index: 9999;\n  pointer-events: none;\n}\n\n#pill-nav-inner {\n  display: inline-flex;\n  align-items: center;\n  background: '+navbg+';\n  border-radius: '+navrad+';\n  padding: '+navpad+';\n  gap: 2px;\n  pointer-events: all;\n}\n\n#pnav-brand {\n  font-family: \'DM Mono\', monospace;\n  font-size: '+brandfs+';\n  font-weight: 500;\n  color: '+brandc+';\n  text-decoration: none;\n  padding: 7px 16px 7px 10px;\n  white-space: nowrap;\n}\n\n#pnav-brand:hover { color: '+brandc+'; text-decoration: none; }\n\n.pnav-link {\n  font-family: \'DM Mono\', monospace;\n  font-size: '+linkfs+';\n  font-weight: 400;\n  padding: 6px 14px;\n  color: '+linkc+';\n  text-decoration: none;\n  border-radius: '+pillrad+';\n  white-space: nowrap;\n}\n\n.pnav-link:hover { opacity: 0.6; text-decoration: none; }\n\n.pnav-link.active {\n  background: '+pillbg+';\n  color: '+activec+';\n}\n</style>\n\n<div id="pill-nav-wrapper">\n  <div id="pill-nav-inner">\n    '+brandHtml+'\n'+linksHtml+'\n  </div>\n</div>\n\n<script>\ndocument.addEventListener(\'DOMContentLoaded\', function() {\n  var path = window.location.pathname;\n  var links = document.querySelectorAll(\'.pnav-link\');\n  var matched = false;\n  links.forEach(function(link) {\n    var href = link.getAttribute(\'href\');\n    if (path === href || (href !== \'/\' && path.startsWith(href + \'/\'))) {\n      link.classList.add(\'active\');\n      matched = true;\n    }\n  });\n  if (!matched) links[0].classList.add(\'active\');\n  try {\n    var title = window.Static.SQUARESPACE_CONTEXT.website.siteTitle;\n    if (title) document.getElementById(\'pnav-brand\').textContent = title;\n  } catch(e) {}\n});\n<\/script>';

  $('code-text').textContent=code;
  $('code-out').style.display='block';
});

$('copy-btn').addEventListener('click',function(){
  navigator.clipboard.writeText($('code-text').textContent).then(function(){
    $('copy-btn').textContent='Copied!';
    setTimeout(function(){$('copy-btn').textContent='Copy';},1500);
  });
});

renderPages();
update();
</script>
