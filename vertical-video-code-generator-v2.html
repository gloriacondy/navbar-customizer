
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Manrope',sans-serif;}
.mono{font-family:'DM Mono',monospace;}
.app{padding:1.5rem 0;}
.app-title{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-text-primary);margin-bottom:3px;}
.app-sub{font-family:'Manrope',sans-serif;font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem;}
.layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:1rem;}
@media(max-width:580px){.layout{grid-template-columns:1fr;}}
.panel{background:#fff;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;}
.panel-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:.9rem;}
.field{margin-bottom:.9rem;}
.field label{display:block;font-family:'Manrope',sans-serif;font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;}
.field input[type="url"],.field input[type="text"]{width:100%;font-family:'Manrope',sans-serif;font-size:13px;}
.field input[type="color"]{width:36px;height:28px;padding:2px;border-radius:6px;border:1px solid var(--color-border-secondary);cursor:pointer;background:none;}
.row{display:flex;gap:8px;align-items:center;}
.row input[type="range"]{flex:1;}
.val{font-family:'DM Mono',monospace;font-size:12px;min-width:38px;text-align:right;color:var(--color-text-secondary);}
.tg{display:flex;gap:5px;flex-wrap:wrap;}
.tb{font-family:'Manrope',sans-serif;font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s;}
.tb.on{background:var(--color-text-primary);color:#fff;border-color:transparent;}
.sep{height:1px;background:var(--color-border-tertiary);margin:.85rem 0;}
.preview-bg{display:flex;justify-content:center;align-items:center;min-height:260px;background:var(--color-background-secondary);border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.video-container{position:relative;overflow:hidden;}
.video-blocker{position:absolute;inset:0;z-index:10;cursor:default;}
.code-pre{background:var(--color-background-secondary);border-radius:8px;padding:.9rem;font-family:'DM Mono',monospace;font-size:11px;color:var(--color-text-primary);overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:220px;overflow-y:auto;line-height:1.6;border:1px solid var(--color-border-tertiary);margin-bottom:10px;}
.copy-btn{width:100%;padding:9px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;background:var(--color-text-primary);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s;}
.copy-btn:hover{opacity:.82;}
.copy-btn.ok{background:#1D9E75;}
.src-tabs{display:flex;gap:4px;margin-bottom:.9rem;}
.src-tab{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:5px 12px;border-radius:6px;border:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;}
.src-tab.on{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);}
.color-row{display:flex;align-items:center;gap:8px;}
.color-row span{font-family:'Manrope',sans-serif;font-size:12px;color:var(--color-text-secondary);}
</style>

<div class="app">
  <div class="app-title">Vertical Video Embed Generator</div>
  <div class="app-sub">Paste a link, style it, copy the code into your Squarespace code block.</div>

  <div class="layout">
    <div>
      <div class="panel">
        <div class="panel-title">Video Source</div>
        <div class="src-tabs">
          <button class="src-tab on" onclick="setSrc('url',this)">Direct</button>
          <button class="src-tab" onclick="setSrc('youtube',this)">YouTube</button>
          <button class="src-tab" onclick="setSrc('vimeo',this)">Vimeo</button>
        </div>
        <div class="field">
          <label id="url-lbl">Direct video URL (.mp4)</label>
          <input type="url" id="video-url" placeholder="https://your-video.mp4" oninput="update()">
        </div>

        <div class="sep"></div>
        <div class="panel-title">Frame Style</div>

        <div class="field">
          <label>Frame type</label>
          <div class="tg" id="frame-group">
            <button class="tb on" onclick="pick(this,'frame-group');st.frame='none';update()">None</button>
            <button class="tb" onclick="pick(this,'frame-group');st.frame='iphone';update()">iPhone</button>
            <button class="tb" onclick="pick(this,'frame-group');st.frame='minimal';update()">Minimal</button>
            <button class="tb" onclick="pick(this,'frame-group');st.frame='shadow';update()">Shadow</button>
          </div>
        </div>

        <div class="field">
          <label>Corner radius</label>
          <div class="row">
            <input type="range" id="radius" min="0" max="40" value="12" step="1" oninput="st.radius=+this.value;document.getElementById('rv').textContent=this.value+'px';update()">
            <span class="val" id="rv">12px</span>
          </div>
        </div>

        <div class="field">
          <label>Max width</label>
          <div class="row">
            <input type="range" id="maxw" min="160" max="480" value="280" step="10" oninput="st.maxw=+this.value;document.getElementById('wv').textContent=this.value+'px';update()">
            <span class="val" id="wv">280px</span>
          </div>
        </div>

        <div class="field">
          <label>Border</label>
          <div class="tg" id="border-group">
            <button class="tb on" onclick="pick(this,'border-group');st.border='none';toggleBorderColor();update()">None</button>
            <button class="tb" onclick="pick(this,'border-group');st.border='thin';toggleBorderColor();update()">Thin</button>
            <button class="tb" onclick="pick(this,'border-group');st.border='thick';toggleBorderColor();update()">Thick</button>
          </div>
        </div>

        <div class="field" id="bc-field" style="display:none;">
          <label>Border color</label>
          <div class="color-row">
            <input type="color" id="border-color" value="#ffffff" oninput="st.borderColor=this.value;update()">
            <span id="bc-hex">#ffffff</span>
          </div>
        </div>

        <div class="field">
          <label>Background color</label>
          <div class="color-row">
            <input type="color" id="bg-color" value="#000000" oninput="st.bgColor=this.value;document.getElementById('bg-hex').textContent=this.value;update()">
            <span id="bg-hex">#000000</span>
          </div>
        </div>

        <div class="sep"></div>
        <div class="panel-title">Playback</div>

        <div class="field">
          <div class="tg">
            <button class="tb on" id="auto-btn" onclick="st.autoplay=!st.autoplay;this.textContent=st.autoplay?'Autoplay on':'Autoplay off';this.classList.toggle('on',st.autoplay);update()">Autoplay on</button>
            <button class="tb on" id="loop-btn" onclick="st.loop=!st.loop;this.textContent=st.loop?'Loop on':'Loop off';this.classList.toggle('on',st.loop);update()">Loop on</button>
            <button class="tb on" id="mute-btn" onclick="st.muted=!st.muted;this.textContent=st.muted?'Muted':'Sound on';this.classList.toggle('on',st.muted);update()">Muted</button>
          </div>
        </div>

        <div class="sep"></div>
        <div class="panel-title">Privacy</div>

        <div class="field">
          <div class="tg">
            <button class="tb on" id="hide-btn" onclick="st.hideSource=!st.hideSource;this.textContent=st.hideSource?'Source hidden':'Show source';this.classList.toggle('on',st.hideSource);update()">Source hidden</button>
          </div>
          <label style="margin-top:6px;color:var(--color-text-tertiary);font-size:11px;">Disables click-through to original video page</label>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:1rem;">
      <div class="panel">
        <div class="panel-title">Preview</div>
        <div class="preview-bg">
          <div style="position:relative;" id="phone-shell">
            <div class="video-container" id="vc">
              <div class="video-blocker" id="blocker"></div>
              <div id="vi" style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Embed Code — Squarespace Code Block</div>
        <pre class="code-pre" id="code-out"></pre>
        <button class="copy-btn" id="copy-btn" onclick="copyCode()">Copy Code</button>
      </div>
    </div>
  </div>
</div>

<script>
const st={url:'',srcType:'url',frame:'none',radius:12,maxw:280,border:'none',borderColor:'#ffffff',bgColor:'#000000',autoplay:true,loop:true,muted:true,hideSource:true};

function pick(el,gid){document.getElementById(gid).querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));el.classList.add('on');}
function setSrc(t,el){st.srcType=t;document.querySelectorAll('.src-tab').forEach(b=>b.classList.remove('on'));el.classList.add('on');const lbl=document.getElementById('url-lbl'),inp=document.getElementById('video-url');if(t==='youtube'){lbl.textContent='YouTube URL or video ID';inp.placeholder='https://youtu.be/... or dQw4w9WgXcQ';}else if(t==='vimeo'){lbl.textContent='Vimeo URL or video ID';inp.placeholder='https://vimeo.com/123456789';}else{lbl.textContent='Direct video URL (.mp4)';inp.placeholder='https://your-video.mp4';}update();}
function toggleBorderColor(){document.getElementById('bc-field').style.display=st.border==='none'?'none':'block';}

function update(){
  st.url=document.getElementById('video-url').value.trim();
  document.getElementById('bc-hex').textContent=st.borderColor;
  renderPreview();renderCode();
}

function renderPreview(){
  const vc=document.getElementById('vc'),vi=document.getElementById('vi');
  const w=Math.min(st.maxw,190),h=Math.round(w*16/9);
  vc.style.width=w+'px';vc.style.height=h+'px';
  const r=st.frame==='iphone'?28:st.radius;
  vc.style.borderRadius=r+'px';
  vc.style.background=st.bgColor;
  vi.style.background=st.bgColor;
  vc.style.boxShadow='none';vc.style.border='none';vc.style.outline='none';
  const shell=document.getElementById('phone-shell');
  const oldN=shell.querySelector('.pnotch');if(oldN)oldN.remove();
  const oldH=shell.querySelector('.phome');if(oldH)oldH.remove();
  if(st.frame==='iphone'){
    vc.style.border='3px solid #1a1a1a';
    vc.style.boxShadow='0 0 0 6px #2a2a2a,0 0 0 8px #3a3a3a';
    const n=document.createElement('div');n.className='pnotch';
    n.style.cssText='position:absolute;top:0;left:50%;transform:translateX(-50%);width:64px;height:16px;background:#1a1a1a;border-radius:0 0 10px 10px;z-index:11;';
    const hb=document.createElement('div');hb.className='phome';
    hb.style.cssText='position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:60px;height:4px;background:rgba(0,0,0,0.3);border-radius:2px;z-index:11;';
    vc.appendChild(n);vc.appendChild(hb);
  }else if(st.frame==='shadow'){
    vc.style.boxShadow='0 16px 48px rgba(0,0,0,0.35)';
  }else if(st.frame==='minimal'){
    vc.style.border='1px solid rgba(255,255,255,0.18)';
  }
  if(st.border==='thin')vc.style.border=`1px solid ${st.borderColor}`;
  if(st.border==='thick')vc.style.border=`4px solid ${st.borderColor}`;
}

function getEmbed(){
  const url=st.url;
  if(!url)return null;
  if(st.srcType==='youtube'){
    const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    const id=m?m[1]:url.replace(/\s/g,'');
    const p=['playsinline=1','rel=0','modestbranding=1'];
    if(st.autoplay)p.push('autoplay=1');
    if(st.loop)p.push('loop=1','playlist='+id);
    if(st.muted)p.push('mute=1');
    if(st.hideSource)p.push('controls=0','showinfo=0','iv_load_policy=3','disablekb=1');
    return{type:'iframe',src:`https://www.youtube.com/embed/${id}?`+p.join('&')};
  }
  if(st.srcType==='vimeo'){
    const m=url.match(/vimeo\.com\/(\d+)/);
    const id=m?m[1]:url.replace(/\D/g,'');
    const p=['playsinline=1'];
    if(st.hideSource)p.push('background=1');
    if(st.autoplay)p.push('autoplay=1');
    if(st.loop)p.push('loop=1');
    if(st.muted)p.push('muted=1');
    return{type:'iframe',src:`https://player.vimeo.com/video/${id}?`+p.join('&')};
  }
  return{type:'video',src:url};
}

function renderCode(){
  const embed=getEmbed();
  const r=st.frame==='iphone'?28:st.radius;
  let extraStyle='';
  if(st.frame==='iphone')extraStyle+=`\n    box-shadow: 0 0 0 6px #2a2a2a, 0 0 0 8px #3a3a3a;\n    border: 3px solid #1a1a1a;`;
  if(st.frame==='shadow')extraStyle+=`\n    box-shadow: 0 16px 48px rgba(0,0,0,0.35);`;
  if(st.frame==='minimal')extraStyle+=`\n    border: 1px solid rgba(255,255,255,0.18);`;
  if(st.border==='thin')extraStyle+=`\n    border: 1px solid ${st.borderColor};`;
  if(st.border==='thick')extraStyle+=`\n    border: 4px solid ${st.borderColor};`;

  const iphoneExtras=st.frame==='iphone'?`
  <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:64px;height:16px;background:#1a1a1a;border-radius:0 0 10px 10px;z-index:2;pointer-events:none;"></div>
  <div style="position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:60px;height:4px;background:rgba(0,0,0,0.3);border-radius:2px;z-index:2;pointer-events:none;"></div>`:'';

  const hideOverlay=st.hideSource?`
  <div style="position:absolute;inset:0;z-index:5;pointer-events:auto;cursor:default;"></div>`:'';

  let mediaEl='  <!-- add a video URL above to generate embed code -->';
  if(embed){
    if(embed.type==='iframe'){
      mediaEl=`  <iframe
    src="${embed.src}"
    frameborder="0"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen
    style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"
  ></iframe>`;
    }else{
      const attrs=[];
      if(st.autoplay)attrs.push('autoplay');
      if(st.loop)attrs.push('loop');
      if(st.muted)attrs.push('muted');
      attrs.push('playsinline');
      if(st.hideSource)attrs.push('controlslist="nodownload nofullscreen noremoteplayback"');
      mediaEl=`  <video
    src="${embed.src}"
    ${attrs.join('\n    ')}
    style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;"
  ></video>`;
    }
  }

  const code=`<!-- Vertical Video Embed | verticalvideo.tools -->
<div style="display:flex;justify-content:center;padding:1rem 0;">
  <div style="
    position: relative;
    width: 100%;
    max-width: ${st.maxw}px;
    aspect-ratio: 9 / 16;
    background: ${st.bgColor};
    border-radius: ${r}px;
    overflow: hidden;${extraStyle}
  ">${iphoneExtras}${hideOverlay}
${mediaEl}
  </div>
</div>`;

  document.getElementById('code-out').textContent=code;
}

function copyCode(){
  navigator.clipboard.writeText(document.getElementById('code-out').textContent).then(()=>{
    const b=document.getElementById('copy-btn');
    b.textContent='Copied!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='Copy Code';b.classList.remove('ok');},2000);
  });
}

update();
</script>
