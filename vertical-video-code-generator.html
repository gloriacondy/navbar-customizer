
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .app { padding: 1.5rem 0; }
  h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }

  .layout { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 1.5rem; }
  @media (max-width: 600px) { .layout { grid-template-columns: 1fr; } }

  .panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; }
  .panel-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .field input[type="text"], .field input[type="url"], .field select { width: 100%; }
  .field input[type="color"] { width: 40px; height: 32px; padding: 2px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); cursor: pointer; }

  .row { display: flex; gap: 8px; align-items: center; }
  .row input[type="range"] { flex: 1; }
  .row .val { font-size: 13px; min-width: 36px; text-align: right; color: var(--color-text-secondary); }

  .toggle-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .toggle-btn { font-size: 13px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
  .toggle-btn.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }

  .preview-wrap { display: flex; justify-content: center; align-items: center; min-height: 280px; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.5rem; }
  .phone-shell { position: relative; }
  .phone-frame { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
  .video-container { position: relative; overflow: hidden; }
  .video-inner { width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; }
  .play-icon { width: 32px; height: 32px; fill: rgba(255,255,255,0.7); }
  .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 90px; height: 22px; background: #1a1a1a; border-radius: 0 0 14px 14px; z-index: 3; }
  .home-bar { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 80px; height: 4px; background: rgba(0,0,0,0.3); border-radius: 2px; z-index: 3; }

  .code-area { position: relative; margin-top: 1rem; }
  .code-area pre { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; font-family: var(--font-mono); font-size: 12px; color: var(--color-text-primary); overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 260px; overflow-y: auto; line-height: 1.6; border: 0.5px solid var(--color-border-tertiary); }
  .copy-btn { margin-top: 10px; width: 100%; padding: 10px; font-size: 14px; font-weight: 500; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); cursor: pointer; transition: opacity 0.15s; }
  .copy-btn:hover { opacity: 0.85; }
  .copy-btn.copied { background: #1D9E75; }

  .tabs { display: flex; gap: 4px; margin-bottom: 1rem; }
  .tab { font-size: 13px; padding: 5px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-secondary); }

  .section-sep { height: 0.5px; background: var(--color-border-tertiary); margin: 1rem 0; }
</style>

<div class="app">
  <h1>Vertical video embed generator</h1>
  <p class="subtitle">Paste a video link, style it, copy the code into your Squarespace code block.</p>

  <div class="layout">
    <div>
      <div class="panel">
        <div class="panel-title">Video source</div>
        <div class="tabs">
          <button class="tab active" onclick="setSourceType('url')">Video URL</button>
          <button class="tab" onclick="setSourceType('youtube')">YouTube</button>
          <button class="tab" onclick="setSourceType('vimeo')">Vimeo</button>
        </div>
        <div class="field">
          <label id="url-label">Direct video URL (.mp4, etc.)</label>
          <input type="url" id="video-url" placeholder="https://your-video.mp4" oninput="update()" />
        </div>

        <div class="section-sep"></div>
        <div class="panel-title">Frame style</div>

        <div class="field">
          <label>Frame type</label>
          <div class="toggle-group">
            <button class="toggle-btn active" onclick="setFrame('none', this)">None</button>
            <button class="toggle-btn" onclick="setFrame('iphone', this)">iPhone</button>
            <button class="toggle-btn" onclick="setFrame('minimal', this)">Minimal</button>
            <button class="toggle-btn" onclick="setFrame('shadow', this)">Shadow card</button>
          </div>
        </div>

        <div class="field">
          <label>Corner radius</label>
          <div class="row">
            <input type="range" id="radius" min="0" max="40" value="12" oninput="update(); document.getElementById('r-val').textContent=this.value+'px'" />
            <span class="val" id="r-val">12px</span>
          </div>
        </div>

        <div class="field">
          <label>Max width</label>
          <div class="row">
            <input type="range" id="maxw" min="160" max="480" value="280" step="10" oninput="update(); document.getElementById('w-val').textContent=this.value+'px'" />
            <span class="val" id="w-val">280px</span>
          </div>
        </div>

        <div class="field">
          <label>Border</label>
          <div class="toggle-group" id="border-group">
            <button class="toggle-btn active" onclick="setBorder('none', this)">None</button>
            <button class="toggle-btn" onclick="setBorder('thin', this)">Thin</button>
            <button class="toggle-btn" onclick="setBorder('thick', this)">Thick</button>
          </div>
        </div>

        <div class="field" id="border-color-field" style="display:none;">
          <label>Border color</label>
          <input type="color" id="border-color" value="#ffffff" oninput="update()" />
        </div>

        <div class="field">
          <label>Background color</label>
          <input type="color" id="bg-color" value="#000000" oninput="update()" />
        </div>

        <div class="field">
          <label>Autoplay &amp; loop</label>
          <div class="toggle-group">
            <button class="toggle-btn active" id="auto-btn" onclick="toggleAuto(this)">Autoplay on</button>
            <button class="toggle-btn active" id="loop-btn" onclick="toggleLoop(this)">Loop on</button>
            <button class="toggle-btn active" id="mute-btn" onclick="toggleMute(this)">Muted</button>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:1rem;">
      <div class="panel">
        <div class="panel-title">Preview</div>
        <div class="preview-wrap" id="preview-wrap">
          <div class="phone-shell" id="phone-shell">
            <div class="video-container" id="video-container">
              <div class="video-inner" id="video-inner">
                <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Your embed code</div>
        <div class="code-area">
          <pre id="code-out"></pre>
          <button class="copy-btn" id="copy-btn" onclick="copyCode()">Copy code</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let state = {
  url: '',
  sourceType: 'url',
  frame: 'none',
  radius: 12,
  maxw: 280,
  border: 'none',
  borderColor: '#ffffff',
  bgColor: '#000000',
  autoplay: true,
  loop: true,
  muted: true
};

function setSourceType(t) {
  state.sourceType = t;
  document.querySelectorAll('.tabs .tab').forEach((b,i) => b.classList.toggle('active', ['url','youtube','vimeo'][i]===t));
  const lbl = document.getElementById('url-label');
  const inp = document.getElementById('video-url');
  if(t==='youtube'){ lbl.textContent='YouTube video URL or ID'; inp.placeholder='https://youtu.be/... or video ID'; }
  else if(t==='vimeo'){ lbl.textContent='Vimeo video URL or ID'; inp.placeholder='https://vimeo.com/... or video ID'; }
  else { lbl.textContent='Direct video URL (.mp4, etc.)'; inp.placeholder='https://your-video.mp4'; }
  update();
}

function setFrame(f, el) {
  state.frame = f;
  document.querySelectorAll('.toggle-btn').forEach(b => { if(['None','iPhone','Minimal','Shadow card'].includes(b.textContent)) b.classList.remove('active'); });
  el.classList.add('active');
  update();
}

function setBorder(b, el) {
  state.border = b;
  document.querySelectorAll('#border-group .toggle-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('border-color-field').style.display = b==='none' ? 'none' : 'block';
  update();
}

function toggleAuto(el) { state.autoplay=!state.autoplay; el.textContent=state.autoplay?'Autoplay on':'Autoplay off'; el.classList.toggle('active',state.autoplay); update(); }
function toggleLoop(el) { state.loop=!state.loop; el.textContent=state.loop?'Loop on':'Loop off'; el.classList.toggle('active',state.loop); update(); }
function toggleMute(el) { state.muted=!state.muted; el.textContent=state.muted?'Muted':'Sound on'; el.classList.toggle('active',state.muted); update(); }

function update() {
  state.url = document.getElementById('video-url').value.trim();
  state.radius = parseInt(document.getElementById('radius').value);
  state.maxw = parseInt(document.getElementById('maxw').value);
  state.borderColor = document.getElementById('border-color').value;
  state.bgColor = document.getElementById('bg-color').value;
  renderPreview();
  renderCode();
}

function renderPreview() {
  const container = document.getElementById('video-container');
  const shell = document.getElementById('phone-shell');
  const inner = document.getElementById('video-inner');
  const w = Math.min(state.maxw, 200);
  const h = Math.round(w * 16/9);

  container.style.width = w+'px';
  container.style.height = h+'px';
  container.style.borderRadius = state.radius+'px';
  container.style.background = state.bgColor;

  let boxShadow = 'none';
  let border = 'none';

  if(state.frame==='iphone') {
    container.style.borderRadius = '28px';
    const notch = shell.querySelector('.notch') || document.createElement('div');
    notch.className='notch'; notch.style.width='70px'; notch.style.height='18px';
    const home = shell.querySelector('.home-bar') || document.createElement('div');
    home.className='home-bar';
    if(!shell.querySelector('.notch')) { container.appendChild(notch); container.appendChild(home); }
    border = '3px solid #1a1a1a';
    boxShadow = '0 0 0 6px #2a2a2a, 0 0 0 8px #3a3a3a';
  } else {
    const n = container.querySelector('.notch'); if(n) n.remove();
    const hb = container.querySelector('.home-bar'); if(hb) hb.remove();
    container.style.borderRadius = state.radius+'px';
  }

  if(state.frame==='shadow') { boxShadow = '0 20px 60px rgba(0,0,0,0.4)'; }
  if(state.frame==='minimal') { border = '1px solid rgba(255,255,255,0.15)'; }

  if(state.border==='thin') { border = `1px solid ${state.borderColor}`; }
  if(state.border==='thick') { border = `4px solid ${state.borderColor}`; }

  container.style.boxShadow = boxShadow;
  container.style.border = border;
  inner.style.background = state.bgColor;
}

function getEmbedSrc() {
  const url = state.url;
  if(!url) return null;
  if(state.sourceType==='youtube') {
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    const id = m ? m[1] : url.replace(/\s/g,'');
    let src = `https://www.youtube.com/embed/${id}?`;
    const p = [];
    if(state.autoplay) p.push('autoplay=1');
    if(state.loop) p.push('loop=1','playlist='+id);
    if(state.muted) p.push('mute=1');
    p.push('controls=0','playsinline=1','rel=0');
    return { type:'iframe', src: src+p.join('&') };
  }
  if(state.sourceType==='vimeo') {
    const m = url.match(/vimeo\.com\/(\d+)/);
    const id = m ? m[1] : url.replace(/\D/g,'');
    let src = `https://player.vimeo.com/video/${id}?`;
    const p = ['background=1'];
    if(state.autoplay) p.push('autoplay=1');
    if(state.loop) p.push('loop=1');
    if(state.muted) p.push('muted=1');
    return { type:'iframe', src: src+p.join('&') };
  }
  return { type:'video', src: url };
}

function getFrameStyles() {
  const r = state.frame==='iphone' ? 28 : state.radius;
  let extra = '';
  if(state.frame==='iphone') extra = `\n  box-shadow: 0 0 0 6px #2a2a2a, 0 0 0 8px #3a3a3a;\n  border: 3px solid #1a1a1a;`;
  if(state.frame==='shadow') extra = `\n  box-shadow: 0 20px 60px rgba(0,0,0,0.4);`;
  if(state.frame==='minimal') extra = `\n  border: 1px solid rgba(255,255,255,0.15);`;
  if(state.border==='thin') extra += `\n  border: 1px solid ${state.borderColor};`;
  if(state.border==='thick') extra += `\n  border: 4px solid ${state.borderColor};`;
  return { r, extra };
}

function renderCode() {
  const embed = getEmbedSrc();
  const { r, extra } = getFrameStyles();
  const iphone_notch = state.frame==='iphone' ? `\n  <!-- iPhone notch -->\n  <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:70px;height:18px;background:#1a1a1a;border-radius:0 0 12px 12px;z-index:2;"></div>\n  <!-- home bar -->\n  <div style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:70px;height:4px;background:rgba(0,0,0,0.3);border-radius:2px;z-index:2;"></div>` : '';

  let mediaEl = '';
  if(!embed) {
    mediaEl = `  <!-- paste your video URL above to generate the embed -->`;
  } else if(embed.type==='iframe') {
    mediaEl = `  <iframe\n    src="${embed.src}"\n    frameborder="0"\n    allow="autoplay; fullscreen"\n    allowfullscreen\n    style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"\n  ></iframe>`;
  } else {
    const attrs = [];
    if(state.autoplay) attrs.push('autoplay');
    if(state.loop) attrs.push('loop');
    if(state.muted) attrs.push('muted');
    attrs.push('playsinline');
    mediaEl = `  <video\n    src="${embed.src}"\n    ${attrs.join('\n    ')}\n    style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;"\n  ></video>`;
  }

  const code = `<div style="display:flex;justify-content:center;">
  <div style="
    position:relative;
    width:100%;
    max-width:${state.maxw}px;
    aspect-ratio:9/16;
    background:${state.bgColor};
    border-radius:${r}px;
    overflow:hidden;${extra}
  ">
${iphone_notch}
${mediaEl}
  </div>
</div>`;

  document.getElementById('code-out').textContent = code;
}

function copyCode() {
  const code = document.getElementById('code-out').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent='Copy code'; btn.classList.remove('copied'); }, 2000);
  });
}

update();
</script>
