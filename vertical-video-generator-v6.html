<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#fff;font-family:'Manrope',sans-serif;font-size:12px;color:#222;}

.app{border:1px solid #d0d3d8;border-radius:12px;overflow:hidden;}

.cols{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,260px);align-items:start;}
@media(max-width:640px){.cols{grid-template-columns:1fr;}}

/* ─── LEFT: Settings ─── */
.settings{background:#eef0f3;padding:16px 20px;border-right:1px solid #d0d3d8;}

.sec{margin-bottom:14px;position:relative;}
.sec h3{font-size:9px;font-weight:500;color:#999;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #dde0e5;}

/* URL row */
.url-row{display:flex;align-items:center;gap:6px;}
.url-inp{flex:1;font-size:11px;font-family:'Manrope',sans-serif;height:26px;padding:0 7px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#111;outline:none;}
.url-inp:focus{border-color:#999;}
.url-inp::placeholder{color:#bbb;}
.prev-btn{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;height:26px;padding:0 10px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#666;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.prev-btn:hover{background:#e8eaed;color:#333;border-color:#aaa;}

/* Seg */
.seg{display:flex;border:1px solid #ccc;border-radius:4px;overflow:hidden;margin-bottom:8px;}
.seg-btn{flex:1;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:5px 4px;border:none;background:#fff;color:#888;cursor:pointer;border-right:1px solid #ccc;}
.seg-btn:last-child{border-right:none;}
.seg-btn.on{background:#222;color:#fff;}
.seg-btn:hover:not(.on){background:#e8eaed;color:#444;}

/* Row */
.row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.row:last-child{margin-bottom:0;}
.row label{font-size:11px;color:#666;font-family:'Manrope',sans-serif;width:72px;flex-shrink:0;}
.row input[type=range]{flex:1;accent-color:#333;}
.vl{font-size:10px;color:#bbb;font-family:'DM Mono',monospace;width:28px;text-align:right;flex-shrink:0;}

/* Colors */
.color-pair{display:flex;gap:10px;margin-top:6px;}
.color-item{flex:1;}
.clbl{font-size:10px;color:#888;font-family:'Manrope',sans-serif;margin-bottom:4px;display:block;}
.hx{display:flex;align-items:center;gap:4px;}
.hx input[type=color]{width:24px;height:22px;padding:1px;border:1px solid #ccc;border-radius:4px;cursor:pointer;background:#fff;flex-shrink:0;}
.hx input[type=text]{flex:1;font-size:10px;font-family:'DM Mono',monospace;height:22px;padding:0 5px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#111;outline:none;}
.hx input[type=text]:focus{border-color:#999;}

/* Pills */
.pill-group{display:flex;gap:4px;flex-wrap:wrap;}
.pill{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:4px 11px;border:1px solid #ccc;border-radius:20px;background:#fff;color:#888;cursor:pointer;transition:all .12s;}
.pill.on{background:#222;color:#fff;border-color:#222;}
.pill:hover:not(.on){background:#e8eaed;color:#444;}

/* Playback toggles */
.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 8px;}
.pb-toggle{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:4px 11px;border:1px solid #ccc;border-radius:20px;background:#fff;color:#888;cursor:pointer;transition:all .12s;white-space:nowrap;width:100%;}
.pb-toggle.on{background:#222;color:#fff;border-color:#222;}
.pb-toggle:hover:not(.on){background:#e8eaed;color:#444;}
.pb-span2{grid-column:span 2;}

/* Footer */
.footer{margin-top:14px;padding-top:12px;border-top:1px solid #dde0e5;display:flex;justify-content:flex-end;gap:8px;}
.btn-reset{padding:7px 14px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#444;font-size:11px;font-family:'Manrope',sans-serif;cursor:pointer;}
.btn-reset:hover{background:#f0f0f0;}
.btn-export{padding:7px 18px;border-radius:6px;border:none;background:#222;color:#fff;font-size:11px;font-family:'Manrope',sans-serif;cursor:pointer;font-weight:500;}
.btn-export:hover{background:#444;}

/* ─── RIGHT: Preview + Code ─── */
.right-panel{display:flex;flex-direction:column;}

.preview-area{display:flex;align-items:center;justify-content:center;height:260px;background-image:linear-gradient(45deg,#c4c4c4 25%,transparent 25%),linear-gradient(-45deg,#c4c4c4 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#c4c4c4 75%),linear-gradient(-45deg,transparent 75%,#c4c4c4 75%);background-size:14px 14px;background-position:0 0,0 7px,7px -7px,-7px 0;background-color:#d8d8d8;border-bottom:1px solid #d0d3d8;}

/* Code panel — height = preview-area height = 260px */
.code-panel{background:#1a1a1a;}
.code-top{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #2a2a2a;}
.code-top-label{font-size:10.5px;color:#666;font-family:'Manrope',sans-serif;}
.copy-btn{font-size:10.5px;font-family:'Manrope',sans-serif;background:#2a2a2a;color:#bbb;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;}
.copy-btn:hover{background:#3a3a3a;color:#fff;}
.copy-btn.ok{color:#4ade80;}
.code-box{padding:12px 14px;font-size:10.5px;font-family:'DM Mono',monospace;color:#d4d4d4;white-space:pre-wrap;word-break:break-all;line-height:1.55;height:224px;overflow-y:auto;}
</style>
</head>
<body>
<div class="app">
  <div class="cols">

    <!-- LEFT -->
    <div class="settings">

      <div class="sec">
        <h3>Video Source</h3>
        <div class="seg" id="src-seg">
          <button class="seg-btn on" onclick="setSrc('url',0)">Direct URL</button>
          <button class="seg-btn" onclick="setSrc('youtube',1)">YouTube</button>
          <button class="seg-btn" onclick="setSrc('vimeo',2)">Vimeo</button>
        </div>
        <div id="url-lbl" style="font-size:10px;color:#999;font-family:'DM Mono',monospace;margin-bottom:4px;">Direct video URL (.mp4, .webm)</div>
        <div class="url-row">
          <input class="url-inp" type="text" id="video-url" placeholder="https://your-video.mp4" oninput="update()">
          <button class="prev-btn" onclick="previewUrl()">Preview</button>
        </div>
      </div>

      <div class="sec">
        <h3>Frame</h3>
        <div class="row" style="margin-bottom:8px;">
          <label>Type</label>
          <div class="pill-group" id="frame-group">
            <button class="pill on" onclick="pick('frame-group',this);st.frame='none';update()">None</button>
            <button class="pill" onclick="pick('frame-group',this);st.frame='iphone';update()">iPhone</button>
            <button class="pill" onclick="pick('frame-group',this);st.frame='minimal';update()">Minimal</button>
            <button class="pill" onclick="pick('frame-group',this);st.frame='shadow';update()">Shadow</button>
          </div>
        </div>
        <div class="row">
          <label>Radius</label>
          <input type="range" min="0" max="40" value="12" step="1" oninput="st.radius=+this.value;document.getElementById('rv').textContent=this.value+'px';update()">
          <span class="vl" id="rv">12px</span>
        </div>
        <div class="row">
          <label>Max width</label>
          <input type="range" min="160" max="500" value="320" step="10" oninput="st.maxw=+this.value;document.getElementById('wv').textContent=this.value+'px';update()">
          <span class="vl" id="wv">320px</span>
        </div>
      </div>

      <div class="sec">
        <h3>Border &amp; Color</h3>
        <div class="row">
          <label>Border</label>
          <input type="range" min="0" max="12" value="0" step="1" oninput="st.borderW=+this.value;document.getElementById('bv').textContent=this.value===0?'None':this.value+'px';update()">
          <span class="vl" id="bv">None</span>
        </div>
        <div class="color-pair">
          <div class="color-item">
            <span class="clbl">Border color</span>
            <div class="hx">
              <input type="color" id="border-color" value="#ffffff" oninput="st.borderColor=this.value;document.getElementById('bc-hex').value=this.value;update()">
              <input type="text" id="bc-hex" value="#ffffff" maxlength="7" oninput="st.borderColor=this.value;document.getElementById('border-color').value=this.value;update()">
            </div>
          </div>
          <div class="color-item">
            <span class="clbl">Background</span>
            <div class="hx">
              <input type="color" id="bg-color" value="#000000" oninput="st.bgColor=this.value;document.getElementById('bg-hex').value=this.value;update()">
              <input type="text" id="bg-hex" value="#000000" maxlength="7" oninput="st.bgColor=this.value;document.getElementById('bg-color').value=this.value;update()">
            </div>
          </div>
        </div>
      </div>

      <div class="sec">
        <h3>Playback</h3>
        <div class="pb-grid">
          <button class="pb-toggle on" id="ap-pill" onclick="st.autoplay=!st.autoplay;this.classList.toggle('on',st.autoplay);update()">Autoplay</button>
          <button class="pb-toggle on" id="lp-pill" onclick="st.loop=!st.loop;this.classList.toggle('on',st.loop);update()">Loop</button>
          <button class="pb-toggle on" id="mu-pill" onclick="st.muted=!st.muted;this.classList.toggle('on',st.muted);update()">Muted</button>
          <button class="pb-toggle on" id="hb-pill" onclick="st.hideSource=!st.hideSource;this.classList.toggle('on',st.hideSource);update()">Hide branding</button>
          <button class="pb-toggle on pb-span2" id="hc-pill" onclick="st.hoverControls=!st.hoverControls;this.classList.toggle('on',st.hoverControls);update()">Controls for viewers</button>
        </div>
      </div>

      <div class="footer">
        <button class="btn-reset" onclick="resetAll()">Reset</button>
        <button class="btn-export" onclick="copyCode()">Copy Code</button>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="right-panel">
      <div class="preview-area" id="preview-area">
        <div style="position:relative;" id="phone-shell">
          <div id="vc" style="position:relative;overflow:hidden;">
            <div style="position:absolute;inset:0;z-index:10;pointer-events:none;"></div>
            <div id="vi" style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(255,255,255,0.35)"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        </div>
      </div>

      <div class="code-panel">
        <div class="code-top">
          <span class="code-top-label">Embed Code — paste into Squarespace Code Block</span>
          <button class="copy-btn" id="copy-btn" onclick="copyCode()">Copy all</button>
        </div>
        <div class="code-box" id="code-out"></div>
      </div>
    </div>

  </div>
</div>

<script>
const st={url:'',srcType:'url',frame:'none',radius:12,maxw:320,borderW:0,borderColor:'#ffffff',bgColor:'#000000',autoplay:true,loop:true,muted:true,hideSource:true,hoverControls:true};

function pick(gid,el){document.getElementById(gid).querySelectorAll('.pill').forEach(b=>b.classList.remove('on'));el.classList.add('on');}

function setSrc(t,idx){
  st.srcType=t;
  document.querySelectorAll('#src-seg .seg-btn').forEach((b,i)=>b.classList.toggle('on',i===idx));
  const lbl=document.getElementById('url-lbl'),inp=document.getElementById('video-url');
  if(t==='youtube'){lbl.textContent='YouTube video URL';inp.placeholder='https://youtu.be/dQw4w9WgXcQ';}
  else if(t==='vimeo'){lbl.textContent='Vimeo video URL';inp.placeholder='https://vimeo.com/123456789';}
  else{lbl.textContent='Direct video URL (.mp4, .webm)';inp.placeholder='https://your-video.mp4';}
  update();
}

function previewUrl(){
  const url=document.getElementById('video-url').value.trim();
  if(!url){alert('Please enter a video URL first.');return;}
  st.url=url;
  renderPreview();
  renderCode();
}

function update(){
  st.url=document.getElementById('video-url').value.trim();
  renderPreview();
  renderCode();
}

function renderPreview(){
  const vc=document.getElementById('vc'),vi=document.getElementById('vi');
  const areaH=260;
  const h=areaH-24;
  const w=Math.round(h*9/16);
  vc.style.width=w+'px';vc.style.height=h+'px';
  const r=st.frame==='iphone'?28:st.radius;
  vc.style.borderRadius=r+'px';
  vi.style.background=st.bgColor;
  vc.style.border='none';vc.style.boxShadow='none';
  const shell=document.getElementById('phone-shell');
  shell.querySelectorAll('.pn,.ph').forEach(e=>e.remove());
  vi.querySelectorAll('video,iframe').forEach(e=>e.remove());

  if(st.frame==='iphone'){
    vc.style.border='3px solid #1a1a1a';
    vc.style.boxShadow='0 0 0 6px #2a2a2a,0 0 0 9px #3a3a3a';
    const n=document.createElement('div');n.className='pn';
    n.style.cssText='position:absolute;top:0;left:50%;transform:translateX(-50%);width:58px;height:14px;background:#1a1a1a;border-radius:0 0 8px 8px;z-index:15;';
    const hb=document.createElement('div');hb.className='ph';
    hb.style.cssText='position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:52px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;z-index:15;';
    vc.appendChild(n);vc.appendChild(hb);
  }else if(st.frame==='shadow'){
    vc.style.boxShadow='0 12px 40px rgba(0,0,0,0.4)';
  }else if(st.frame==='minimal'){
    vc.style.border='1px solid rgba(255,255,255,0.2)';
  }
  if(st.borderW>0)vc.style.border=`${st.borderW}px solid ${st.borderColor}`;

  const icon=vi.querySelector('svg');
  if(st.url){
    const embed=getEmbed();
    if(embed){
      if(embed.type==='iframe'){
        const ifr=document.createElement('iframe');
        ifr.src=embed.src;
        ifr.setAttribute('frameborder','0');
        ifr.setAttribute('allow','autoplay; fullscreen; picture-in-picture');
        ifr.setAttribute('allowfullscreen','');
        ifr.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;border:none;z-index:5;';
        vi.appendChild(ifr);
      }else{
        const vid=document.createElement('video');
        vid.src=embed.src;
        if(st.autoplay)vid.autoplay=true;
        if(st.loop)vid.loop=true;
        if(st.muted)vid.muted=true;
        vid.setAttribute('playsinline','');
        vid.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:5;';
        vi.appendChild(vid);
      }
      if(icon)icon.style.display='none';
    }
  }else{
    if(icon)icon.style.display='';
  }
}

function getEmbed(){
  const url=st.url;if(!url)return null;
  if(st.srcType==='youtube'){
    const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    const id=m?m[1]:url.trim();
    const p=['playsinline=1','rel=0','modestbranding=1','enablejsapi=1'];
    if(st.autoplay)p.push('autoplay=1');
    if(st.loop)p.push('loop=1','playlist='+id);
    if(st.muted)p.push('mute=1');
    if(st.hideSource)p.push('controls=0','iv_load_policy=3','disablekb=1');
    return{type:'iframe',src:`https://www.youtube.com/embed/${id}?`+p.join('&')};
  }
  if(st.srcType==='vimeo'){
    const m=url.match(/vimeo\.com\/(\d+)/);
    const id=m?m[1]:url.replace(/\D/g,'');
    const p=['playsinline=1'];
    if(st.hideSource)p.push('background=1');
    if(st.autoplay)p.push('autoplay=1');
    if(st.loop)p.push('loop=1');
    if(st.muted)p.push('muted=1');
    return{type:'iframe',src:`https://player.vimeo.com/video/${id}?`+p.join('&')};
  }
  return{type:'video',src:url};
}

function renderCode(){
  const embed=getEmbed();
  const r=st.frame==='iphone'?28:st.radius;
  let extra='';
  if(st.frame==='iphone')extra+=`\n    box-shadow:0 0 0 6px #2a2a2a,0 0 0 9px #3a3a3a;\n    border:3px solid #1a1a1a;`;
  if(st.frame==='shadow')extra+=`\n    box-shadow:0 12px 40px rgba(0,0,0,0.5);`;
  if(st.frame==='minimal')extra+=`\n    border:1px solid rgba(255,255,255,0.2);`;
  if(st.borderW>0)extra+=`\n    border:${st.borderW}px solid ${st.borderColor};`;

  const iphoneHTML=st.frame==='iphone'?`
  <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:58px;height:14px;background:#1a1a1a;border-radius:0 0 8px 8px;z-index:2;pointer-events:none;"></div>
  <div style="position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:52px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;z-index:2;pointer-events:none;"></div>`:'';

  let mediaEl='  <!-- Add a video URL above to generate embed code -->';
  if(embed){
    if(embed.type==='iframe'){
      mediaEl=`  <iframe src="${embed.src}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"></iframe>`;
    }else{
      const attrs=[];
      if(st.autoplay)attrs.push('autoplay');
      if(st.loop)attrs.push('loop');
      if(st.muted)attrs.push('muted');
      attrs.push('playsinline');
      if(st.hideSource)attrs.push('controlslist="nodownload nofullscreen noremoteplayback"');
      mediaEl=`  <video src="${embed.src}" ${attrs.join(' ')} style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;" id="vv-vid"></video>`;
    }
  }

  const isDirectVideo=embed&&embed.type==='video';

  // Controls for viewers: mute top-left always, play+scrub appear on hover/tap only
  const hoverControlsHTML=st.hoverControls?`
  <div id="vv-ctrl" style="position:absolute;inset:0;z-index:6;pointer-events:none;">
    <button id="vv-mute" style="position:absolute;top:10px;left:10px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto;opacity:0;transition:opacity 0.2s;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    </button>
    <button id="vv-play" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto;opacity:0;transition:opacity 0.2s;">
      <svg id="vv-play-icon" width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="${st.autoplay?'M6 19h4V5H6v14zm8-14v14h4V5h-4z':'M8 5v14l11-7z'}"/></svg>
    </button>
    <div id="vv-bar-wrap" style="position:absolute;bottom:0;left:0;right:0;height:28px;display:flex;align-items:flex-end;pointer-events:auto;opacity:0;transition:opacity 0.2s;">
      <div id="vv-bar" style="width:100%;height:4px;background:rgba(255,255,255,0.3);cursor:pointer;position:relative;">
        <div id="vv-prog" style="height:100%;width:0%;background:#ffffff;pointer-events:none;"></div>
      </div>
    </div>
  </div>`:'';

  const hoverJS=st.hoverControls&&isDirectVideo?`
<script>
(function(){
  var outer=document.currentScript.previousElementSibling;
  var vid=outer.querySelector('#vv-vid');
  var ctrl=outer.querySelector('#vv-ctrl');
  var muteBtn=outer.querySelector('#vv-mute');
  var playBtn=outer.querySelector('#vv-play');
  var playIcon=outer.querySelector('#vv-play-icon');
  var barWrap=outer.querySelector('#vv-bar-wrap');
  var bar=outer.querySelector('#vv-bar');
  var prog=outer.querySelector('#vv-prog');
  if(!vid||!ctrl)return;
  var playing=${st.autoplay};
  var muted=${st.muted};
  var hideTimer=null;
  function showControls(){
    muteBtn.style.opacity='1';
    playBtn.style.opacity='1';
    barWrap.style.opacity='1';
    ctrl.style.pointerEvents='auto';
    clearTimeout(hideTimer);
  }
  function hideControls(){
    muteBtn.style.opacity='0';
    playBtn.style.opacity='0';
    barWrap.style.opacity='0';
    ctrl.style.pointerEvents='none';
  }
  function scheduleHide(){clearTimeout(hideTimer);hideTimer=setTimeout(hideControls,2500);}
  outer.addEventListener('mouseenter',showControls);
  outer.addEventListener('mouseleave',hideControls);
  outer.addEventListener('touchstart',function(){if(muteBtn.style.opacity!=='1'){showControls();scheduleHide();}},{passive:true});
  outer.addEventListener('touchend',scheduleHide,{passive:true});
  function updPlayIcon(){playIcon.innerHTML=playing?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';}

function copyCode(){
  const code=document.getElementById('code-out').textContent;
  const btn=document.getElementById('copy-btn');
  function markOk(){btn.textContent='Copied!';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy all';btn.classList.remove('ok');},2200);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(code).then(markOk).catch(()=>fallbackCopy(code));}
  else{fallbackCopy(code);}
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');const btn=document.getElementById('copy-btn');btn.textContent='Copied!';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy all';btn.classList.remove('ok');},2200);}catch(e){alert('Please copy the code manually.');}
  document.body.removeChild(ta);
}
